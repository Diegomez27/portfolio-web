<header class="navbar" [class.navbar--scrolled]="isScrolled()">
  <div class="container navbar__inner">

    <!-- Logo -->
    <a class="navbar__logo" href="#">
      <span class="navbar__logo-mark">&lt;</span>
      <span class="navbar__logo-name">Diego</span>
      <span class="navbar__logo-mark">/&gt;</span>
    </a>

    <!-- Desktop nav -->
    <nav class="navbar__links" aria-label="Navegación principal">
      @for (link of navLinks; track link.href) {
        <button class="navbar__link" (click)="scrollTo(link.href)">
          {{ link.label }}
        </button>
      }
    </nav>

    <!-- CTA desktop -->
    <a
      class="btn btn--primary navbar__cta"
      href="https://wa.me/52TUNUMERO?text=Hola%2C%20me%20interesa%20tu%20trabajo"
      target="_blank"
      rel="noopener noreferrer"
    >
      Agendar llamada
    </a>

    <!-- Hamburger (mobile) -->
    <button
      class="navbar__hamburger"
      aria-label="Abrir menú"
      [attr.aria-expanded]="isMobileMenuOpen()"
      (click)="toggleMobileMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>

  <!-- Mobile menu -->
  @if (isMobileMenuOpen()) {
    <div class="navbar__mobile">
      @for (link of navLinks; track link.href) {
        <button class="navbar__mobile-link" (click)="scrollTo(link.href)">
          {{ link.label }}
        </button>
      }
      <a
        class="btn btn--primary"
        href="https://wa.me/52TUNUMERO"
        target="_blank"
        rel="noopener noreferrer"
      >
        Agendar llamada
      </a>
    </div>
  }
</header>
