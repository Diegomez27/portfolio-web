<div class="shell" appCursorRing>
  <!-- RAIL DE NAVEGACIÓN -->
  <aside class="rail">
    <div class="rail__chasis" aria-hidden="true"></div>
    <div class="rail__head">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="10" fill="var(--ink)" />
            <rect x="1.5" y="1.5" width="37" height="37" rx="8.5" fill="none" stroke="var(--bg)" stroke-opacity="0.16"
              stroke-width="0.8" />
            <path fill="var(--bg)" fill-rule="evenodd" d="M9 9 H19 C27 9 32 14 32 20 C32 26 27 31 19 31 H9 Z
                     M15 15 H18 C22 15 24.5 17 24.5 20 C24.5 23 22 25 18 25 H15 Z" />
            <circle cx="34" cy="28.5" r="3.1" fill="var(--accent)" />
            <!-- cicatriz de Luffy: corte curvo + 2 puntadas -->
            <g stroke="#9A9384" stroke-linecap="round" fill="none">
              <path d="M6.5 31.4 Q13.5 34.2 21.5 31.6" stroke-width="1.3" />
              <line x1="11" y1="33.6" x2="12.4" y2="30.3" stroke-width="1.2" />
              <line x1="14" y1="34" x2="15.4" y2="30.7" stroke-width="1.2" />
            </g>
          </svg>
        </span>
        <span class="brand__name">
          <strong>Diego Gómez</strong>
          <span class="mono-label">{{ 'brand.role' | t }}</span>
        </span>
      </div>
      <hr class="rail__sep" />
    </div>

    <!-- Spacer decorativo superior (solo desktop) -->
    <div class="rail__deco rail__deco--top" aria-hidden="true">
      <svg class="rail__orbit" viewBox="0 0 160 160" fill="none">
        <line x1="80" y1="5" x2="80" y2="155" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="2 3"
          class="chasis-y" />
        <line x1="5" y1="80" x2="155" y2="80" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="2 3"
          class="chasis-x" />

        <circle cx="80" cy="80" r="68" stroke="var(--line)" stroke-width="0.4" stroke-dasharray="8 4"
          class="orbit-ring-slow" />
        <circle cx="80" cy="80" r="52" stroke="var(--line)" stroke-width="0.5" class="orbit-ring-mid" />
        <circle cx="80" cy="80" r="36" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="3 3" />
        <circle cx="80" cy="80" r="20" stroke="var(--line)" stroke-width="0.5" />
        <circle cx="80" cy="80" r="8" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="1 2" />

        <g class="orbit-group-1">
          <rect class="orbit-node-sq" x="72" y="4" width="16" height="16" rx="4" stroke="var(--accent-text)"
            stroke-width="0.8" fill="var(--panel)" />
          <line x1="80" y1="6" x2="80" y2="12" stroke="var(--accent)" stroke-width="1.5" />
        </g>

        <g class="orbit-group-2">
          <circle class="orbit-node-dot" cx="80" cy="44" r="2.5" fill="var(--muted)" />
        </g>
      </svg>
    </div>

    <nav class="rail__nav">
      <div class="nav-indicator" #indicator aria-hidden="true"></div>
      @for (c of chapters; track c.id) {
      <button class="nav-row" [attr.data-id]="c.id" [class.active]="nav.active() === c.id" (click)="nav.go(c.id)">
        <span class="bar"></span>
        <span class="num">{{ c.num }}</span>
        <span class="label">{{ ('nav.' + c.id) | t }}</span>
      </button>
      }
    </nav>

    <!-- Spacer decorativo inferior (solo desktop) -->
    <div class="rail__deco rail__deco--bottom" aria-hidden="true">
      <svg class="rail__orbit" viewBox="0 0 160 160" fill="none">
        <line x1="24" y1="24" x2="136" y2="136" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="2 3" />
        <line x1="24" y1="136" x2="136" y2="24" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="2 3" />

        <circle cx="80" cy="80" r="70" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="12 4"
          class="orbit-ring-fast" />
        <circle cx="80" cy="80" r="50" stroke="var(--line)" stroke-width="0.5" />
        <circle cx="80" cy="80" r="30" stroke="var(--line)" stroke-width="0.5" stroke-dasharray="4 4" />

        <g class="orbit-group-3">
          <circle class="orbit-node-dot-large" cx="80" cy="150" r="3.5" fill="var(--accent)" />
        </g>
        <g class="orbit-group-4">
          <rect class="orbit-node-sq-small" x="77" y="52" width="6" height="6" rx="1.5" stroke="var(--accent-text)"
            stroke-width="0.8" fill="var(--panel)" />
        </g>
        <g class="orbit-group-5">
          <circle class="orbit-node-dot-small" cx="80" cy="10" r="2" fill="var(--muted)" />
        </g>
      </svg>
    </div>

    <div class="rail__foot">
      <div class="rail__social">
        <a class="rail__icon" href="https://github.com/Diegomez27" target="_blank" rel="noopener" aria-label="GitHub">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor" aria-hidden="true">
            <path
              d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 5 18 5.3 18 5.3c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z" />
          </svg>
        </a>
        <a class="rail__icon" href="https://www.linkedin.com/in/diego-alejandro-g%C3%B3mez-serrano-9abbb038a/"
          target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor" aria-hidden="true">
            <path
              d="M20.45 20.45h-3.56v-5.57c0-1.33 0-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.34V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.55V9h3.57v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.73V1.73C24 .77 23.2 0 22.22 0z" />
          </svg>
        </a>
      </div>

      <div class="status">
        <span class="live-dot"></span>
        <span class="mono-label">{{ 'status.available' | t }}</span>
      </div>

      <app-theme-control />
    </div>
  </aside>

  <!-- ÁREA DE CONTENIDO: scroll real -->
  <main class="scroller" #scroller>
    <section id="home" class="view">
      <app-hero />
      <div class="scroll-hint" aria-hidden="true">
        <span class="mono-label">{{ 'hero.scroll' | t }}</span>
        <svg class="scroll-hint__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M6 13l6 6 6-6" />
        </svg>
      </div>
    </section>
    <section id="services" class="view"><app-services-section /></section>
    <section id="work" class="view"><app-demos-section /></section>
    <section id="contact" class="view"><app-contact-section /></section>
  </main>

  <!-- TAB BAR INFERIOR (móvil): toca para hacer scroll a la sección -->
  <nav class="tabbar">
    @for (c of chapters; track c.id) {
    <button class="tabbar__item" [class.active]="nav.active() === c.id" (click)="nav.go(c.id)">
      <span class="tabbar__num">{{ c.num }}</span>
      <span class="tabbar__label">{{ ('nav.' + c.id) | t }}</span>
    </button>
    }
  </nav>

  <!-- Botón Flotante de WhatsApp (FAB) -->
  <a [href]="whatsappLink" 
     target="_blank" 
     rel="noopener" 
     class="whatsapp-fab" 
     [class.visible]="nav.active() !== 'home'"
     [attr.aria-label]="'contact.tooltip.whatsapp' | t">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
      <path d="M12.012 2c-5.506 0-9.989 4.478-9.99 9.984a9.96 9.96 0 0 0 1.333 4.993L2 22l5.13-1.347a9.945 9.945 0 0 0 4.887 1.28c5.508 0 9.99-4.479 9.992-9.986.001-2.67-1.037-5.18-2.925-7.07C17.194 3.018 14.683 2 12.012 2zm5.726 14.12c-.252.712-1.461 1.306-2.014 1.386-.502.072-1.157.13-3.35-.785-2.803-1.169-4.607-4.025-4.747-4.21-.14-.185-1.136-1.511-1.136-2.885 0-1.374.718-2.051.974-2.322.256-.271.56-.34.747-.34.186 0 .373.001.536.008.17.008.397-.064.62.48.223.542.766 1.869.833 2.006.067.136.112.294.022.476-.09.182-.136.294-.27.452-.136.157-.285.353-.408.473-.136.136-.28.285-.12.56.16.271.71 1.171 1.524 1.895.845.753 1.558.985 1.782 1.097.224.112.355.093.488-.06.133-.153.57-.666.722-.892.152-.226.305-.19.513-.112.209.079 1.32.622 1.547.737.227.114.378.172.435.27.057.099.057.575-.195 1.287z" />
    </svg>
  </a>
</div>
