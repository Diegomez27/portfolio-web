<div class="services">
  <header class="services__head">
    <span class="services__kicker mono-label">{{ 'services.kicker' | t }}</span>
    <h2 class="services__title">{{ 'services.title' | t }}</h2>
    <p class="services__lead">{{ 'services.lead' | t }}</p>
  </header>

  <div class="services__grid" [appReveal]="90">
    @for (s of services; track s.num) {
      <article class="card" appTilt>
        <span class="card__num mono-label">{{ s.num }}</span>
        <h3 class="card__title">{{ s.titleKey | t }}</h3>
        <p class="card__desc">{{ s.descKey | t }}</p>
        <div class="card__tags">
          @for (tag of s.tags; track tag) {
            <span class="pill">{{ tag }}</span>
          }
        </div>
      </article>
    }
  </div>
</div>
