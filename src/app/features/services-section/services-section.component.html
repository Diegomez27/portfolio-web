<div class="services">
  <header class="services__head">
    <span class="services__kicker mono-label">03 / Servicios</span>
    <h2 class="services__title">Cómo puedo ayudarte</h2>
    <p class="services__lead">
      Trabajo de punta a punta: del modelo de datos a la interfaz. Estos son los
      tipos de proyectos.
    </p>
  </header>

  <div class="services__grid">
    @for (s of services; track s.title) {
      <article class="card">
        <span class="card__num mono-label">{{ s.num }}</span>
        <h3 class="card__title">{{ s.title }}</h3>
        <p class="card__desc">{{ s.description }}</p>
        <div class="card__tags">
          @for (t of s.tags; track t) {
            <span class="pill">{{ t }}</span>
          }
        </div>
      </article>
    }
  </div>
</div>
