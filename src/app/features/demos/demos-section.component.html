<div class="work">
  <header class="work__head">
    <span class="work__kicker mono-label">{{ 'work.kicker' | t }}</span>
    <h2 class="work__title">{{ 'work.title' | t }}</h2>
    <p class="work__lead" [innerHTML]="'work.lead' | t"></p>
  </header>

  <div class="soon">
    <span class="soon__badge">
      <span class="soon__dot"></span>
      <span class="mono-label">{{ 'work.badge' | t }}</span>
    </span>
    <h3 class="soon__title">{{ 'work.soonTitle' | t }}</h3>
    <p class="soon__text">{{ 'work.soonText' | t }}</p>
  </div>
</div>
