<div class="work">
  <header class="work__head">
    <span class="work__kicker mono-label">{{ 'work.kicker' | t }}</span>
    <h2 class="work__title">{{ 'work.title' | t }}</h2>
    <p class="work__lead" [innerHTML]="'work.lead' | t"></p>
    <p class="work__disclaimer mono-label">{{ 'work.disclaimer' | t }}</p>
  </header>

  <div class="demos" [appReveal]="120">
    @for (demo of demos; track demo.id) {
      <a
        class="demo"
        [href]="demo.url"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="demo__media">
          <img
            class="demo__img"
            [src]="demo.imgUrl"
            [alt]="demo.titleKey | t"
            loading="lazy"
          />
          <span class="demo__badge mono-label">
            {{ categoryKey[demo.category] | t }}
          </span>
        </div>

        <div class="demo__body">
          <h3 class="demo__title">{{ demo.titleKey | t }}</h3>
          <p class="demo__desc">{{ demo.descKey | t }}</p>

          <ul class="demo__tags">
            @for (tag of demo.tags; track tag) {
              <li class="demo__tag">{{ tag }}</li>
            }
          </ul>

          <span class="demo__cta">
            {{ 'demo.cta' | t }} <span class="arrow">↗</span>
          </span>
        </div>
      </a>
    }
  </div>
</div>
